{% extends "base.html" %}
{% block title %}품목 목록{% endblock %}
{% block content %}
<h2 class="mb-2">품목 관리</h2>
<div class="mb-3">
  <a class="btn btn-primary" href="{{ url_for('item_add') }}">품목 추가</a>
</div>
<table class="table table-bordered table-hover">
  <thead class="table-light">
    <tr><th>품목명</th><th>규격</th><th>단위</th><th>단가</th><th></th></tr>
  </thead>
  <tbody>
    {% for i in items %}
    <tr>
      <td>{{ i.name or '' }}</td>
      <td>{{ i.spec or '' }}</td>
      <td>{{ i.unit or 'EA' }}</td>
      <td>{{ "{:,}".format(i.unit_price or 0) }}</td>
      <td><a href="{{ url_for('item_edit', id=i.id) }}" class="btn btn-sm btn-outline-secondary">수정</a></td>
    </tr>
    {% else %}
    <tr><td colspan="5">등록된 품목이 없습니다.</td></tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
