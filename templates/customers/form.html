{% extends "base.html" %}
{% block title %}{{ '거래처 수정' if customer else '거래처 추가' }}{% endblock %}
{% block content %}
<form method="post">
  <h2 class="mb-2">{{ '거래처 수정' if customer else '거래처 추가' }}</h2>
  <div class="mb-3">
    <button type="submit" class="btn btn-primary">저장</button>
    <a class="btn btn-secondary" href="{{ url_for('customer_list') }}">목록</a>
  </div>
  <div class="row">
    <div class="col-md-6">
      <div class="mb-2">
        <label class="form-label">구분</label>
        <select name="gubun" class="form-select">
          <option value="일반" {{ 'selected' if customer and (customer.gubun or '') == '일반' else '' }}>일반</option>
          <option value="관급" {{ 'selected' if customer and (customer.gubun or '') == '관급' else '' }}>관급</option>
        </select>
      </div>
      <div class="mb-2">
        <label class="form-label">거래처명 *</label>
        <input type="text" name="name" class="form-control" required value="{{ customer.name if customer else '' }}">
      </div>
      <div class="mb-2">
        <label class="form-label">사업자등록번호</label>
        <input type="text" name="biz_no" class="form-control" value="{{ customer.biz_no if customer else '' }}">
      </div>
      <div class="mb-2">
        <label class="form-label">업태</label>
        <input type="text" name="business_type" class="form-control" value="{{ customer.business_type if customer else '' }}">
      </div>
      <div class="mb-2">
        <label class="form-label">종목</label>
        <input type="text" name="business_item" class="form-control" value="{{ customer.business_item if customer else '' }}">
      </div>
      <div class="mb-2">
        <label class="form-label">전화번호</label>
        <input type="text" name="phone" class="form-control" value="{{ customer.phone if customer else '' }}">
      </div>
      <div class="mb-2">
        <label class="form-label">대표자</label>
        <input type="text" name="ceo" class="form-control" value="{{ customer.ceo if customer else '' }}">
      </div>
      <div class="mb-2">
        <label class="form-label">주소</label>
        <input type="text" name="address" class="form-control" value="{{ customer.address if customer else '' }}">
      </div>
    </div>
  </div>
</form>
{% endblock %}
